syntax = "proto3";

package agent_management;

option go_package = "github.com/op/agent-management/gen/agent_management/v1;agent_management_v1";

// Empty message for request/response pairs that don't need parameters
message Empty {}

// Agent entity
message Agent {
  string id = 1;
  string name = 2;
  string version = 3;
  string status = 4;
  string approval_status = 5;
  optional string owner_id = 6;
  optional string description = 7;
  int64 registered_at = 8;
  int64 last_seen_at = 9;
  optional int64 approved_at = 10;
  optional int64 denied_at = 11;
  optional string denial_reason = 12;
}

// Register a new agent
message RegisterRequest {
  string name = 1;
  string version = 2;
  optional string owner_id = 3;
  optional string description = 4;
}

message RegisterResponse {
  Agent agent = 1;
  bool approved = 2;
}

// Get a specific agent by ID
message GetAgentRequest {
  string agent_id = 1;
}

// List all agents with optional filtering
message ListAgentsRequest {
  optional string status_filter = 1;
  optional string approval_status_filter = 2;
  int32 page_size = 3;
  optional string page_token = 4;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
  optional string next_page_token = 2;
}

// Update an existing agent
message UpdateAgentRequest {
  string agent_id = 1;
  optional string name = 2;
  optional string version = 3;
  optional string status = 4;
  optional string owner_id = 5;
  optional string description = 6;
}

// Delete an agent
message DeleteAgentRequest {
  string agent_id = 1;
}

// Approve a pending agent
message ApproveRequest {
  string agent_id = 1;
  optional string approved_by = 2;
  optional string notes = 3;
}

// Deny a pending agent
message DenyRequest {
  string agent_id = 1;
  string reason = 2;
  optional string denied_by = 3;
}

// System information types
message GetSystemInfoRequest {
  string agent_id = 1;
}

message SystemInfo {
  string agent_id = 1;
  OsInfo os_info = 2;
  EnvironmentInfo environment_info = 3;
  ProcessInfo process_info = 4;
  NetworkInfo network_info = 5;
  ResourceInfo resource_info = 6;
  int64 collected_at = 7;
}

message OsInfo {
  string os_name = 1;
  string os_version = 2;
  string kernel_version = 3;
  string hostname = 4;
  string arch = 5;
}

message EnvironmentInfo {
  string user = 1;
  string home_dir = 2;
  string cwd = 3;
  repeated string env_vars = 4;
}

message ProcessInfo {
  int32 pid = 1;
  string parent_pid = 2;
  string name = 3;
  string exe_path = 4;
  int64 start_time = 5;
  int64 uptime_seconds = 6;
}

message NetworkInfo {
  repeated NetworkInterface interfaces = 1;
  repeated NetworkConnection connections = 2;
}

message NetworkInterface {
  string name = 1;
  string mac_address = 2;
  repeated string ipv4_addresses = 3;
  repeated string ipv6_addresses = 4;
  bool is_up = 5;
}

message NetworkConnection {
  string protocol = 1;
  string local_addr = 2;
  string remote_addr = 3;
  string state = 4;
}

message ResourceInfo {
  CpuInfo cpu_info = 1;
  MemoryInfo memory_info = 2;
  repeated DiskInfo disk_info = 3;
}

message CpuInfo {
  string model = 1;
  int32 core_count = 2;
  float usage_percent = 3;
}

message MemoryInfo {
  uint64 total_bytes = 1;
  uint64 used_bytes = 2;
  uint64 available_bytes = 3;
  float usage_percent = 4;
}

message DiskInfo {
  string mount_point = 1;
  string fs_type = 2;
  uint64 total_bytes = 3;
  uint64 used_bytes = 4;
  uint64 available_bytes = 5;
  float usage_percent = 6;
}

// Agent events streaming
message StreamEventsRequest {
  string agent_id = 1;
}

message AgentEvent {
  string event_id = 1;
  string agent_id = 2;
  string event_type = 3;
  string payload = 4;
  int64 timestamp = 5;
}

// Health scoring
message GetAgentHealthRequest {
  string agent_id = 1;
}

message HealthScore {
  string agent_id = 1;
  int32 score = 2;
  string status = 3;
  repeated string factors = 4;
  int64 calculated_at = 5;
}

message StreamHealthRequest {
  string agent_id = 1;
  int32 update_interval_seconds = 2;
}

// Lifecycle events
message GetLifecycleRequest {
  string agent_id = 1;
  int32 max_events = 2;
}

message LifecycleEventsResponse {
  repeated AgentEvent events = 1;
}

message StreamLifecycleRequest {
  string agent_id = 1;
}

// Agent Management Service
service AgentManagementService {
  // Agent CRUD operations
  rpc RegisterAgent(RegisterRequest) returns (RegisterResponse);
  rpc GetAgent(GetAgentRequest) returns (Agent);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc UpdateAgent(UpdateAgentRequest) returns (Agent);
  rpc DeleteAgent(DeleteAgentRequest) returns (Empty);

  // Approval management
  rpc ApproveAgent(ApproveRequest) returns (Agent);
  rpc DenyAgent(DenyRequest) returns (Agent);

  // Diagnostic info
  rpc GetAgentSystemInfo(GetSystemInfoRequest) returns (SystemInfo);

  // Event streaming
  rpc StreamAgentEvents(StreamEventsRequest) returns (stream AgentEvent);

  // Health scoring
  rpc GetAgentHealth(GetAgentHealthRequest) returns (HealthScore);
  rpc StreamAgentHealth(StreamHealthRequest) returns (stream HealthScore);

  // Lifecycle events
  rpc GetAgentLifecycleEvents(GetLifecycleRequest) returns (LifecycleEventsResponse);
  rpc StreamLifecycleEvents(StreamLifecycleRequest) returns (stream AgentEvent);
}
