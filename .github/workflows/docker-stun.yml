name: Docker Stun

on:
  workflow_dispatch:
    inputs:
      NETOPS_STUN_VERSION:
        description: "OxiDNS version tag to embed into image metadata"
        required: false
        type: string
      PUSH:
        description: "Whether to push images"
        required: false
        default: true
        type: boolean

  workflow_call:
    inputs:
      NETOPS_STUN_VERSION:
        required: false
        type: string
      PUSH:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME_DOCKERHUB: YunlongChen/NetOps
  IMAGE_NAME_GHCR: ghcr.io/YunlongChen/NetOps
  RUNTIME_DOCKERFILE: ./crates/domain-stun/packaging/docker/Dockerfile.runtime

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      push: ${{ steps.vars.outputs.push }}
      version: ${{ steps.vars.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      json: ${{ steps.meta.outputs.json }}
    steps:
      - name: Compute vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PUSH=false
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.PUSH }}" == "true" ]]; then
              PUSH=true
            else
              PUSH=false
            fi
          else
            PUSH=true
          fi
          echo "push=${PUSH}" >> "$GITHUB_OUTPUT"

          VERSION="${{ inputs.NETOPS_STUN_VERSION }}"
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF_NAME}"
            elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              echo "workflow_dispatch requires NETOPS_STUN_VERSION or a tag ref"
              exit 1
            else
              VERSION="${GITHUB_SHA}"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME_DOCKERHUB }}
            ${{ env.IMAGE_NAME_GHCR }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ steps.vars.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

  build-amd64:
    name: Build amd64
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Download amd64 release bundle
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .docker-dist /tmp/oxidns-release
          mkdir -p .docker-dist /tmp/oxidns-release

          gh release download "${{ needs.prepare.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "oxidns-x86_64-unknown-linux-musl.tar.gz" \
            --dir /tmp/oxidns-release

          tar -xzf /tmp/oxidns-release/oxidns-x86_64-unknown-linux-musl.tar.gz -C .docker-dist
          test -f .docker-dist/oxidns
          test -f .docker-dist/config.yaml
          test -f .docker-dist/LICENSE
          test -f .docker-dist/webui/index.html

      - name: Log in to Docker Hub
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: needs.prepare.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build amd64 image locally
        if: needs.prepare.outputs.push != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.RUNTIME_DOCKERFILE }}
          platforms: linux/amd64
          labels: ${{ needs.prepare.outputs.labels }}
          tags: oxidns-ci:amd64
          provenance: false
          sbom: false
          load: true
          cache-from: type=gha,scope=oxidns-amd64
          cache-to: type=gha,mode=max,scope=oxidns-amd64
          build-args: |
            NETOPS_STUN_VERSION=${{ needs.prepare.outputs.version }}

      - name: Smoke test amd64 image
        if: needs.prepare.outputs.push != 'true'
        shell: bash
        run: |
          docker run --rm oxidns-ci:amd64 --version
          docker run --rm --entrypoint test oxidns-ci:amd64 -f /etc/oxidns/webui/index.html

      - name: Build and push amd64 by digest
        if: needs.prepare.outputs.push == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.RUNTIME_DOCKERFILE }}
          platforms: linux/amd64
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,"name=${{ env.IMAGE_NAME_DOCKERHUB }},${{ env.IMAGE_NAME_GHCR }}",push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=oxidns-amd64
          cache-to: type=gha,mode=max,scope=oxidns-amd64
          build-args: |
            NETOPS_STUN_VERSION=${{ needs.prepare.outputs.version }}

      - name: Export digest
        if: needs.prepare.outputs.push == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: needs.prepare.outputs.push == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
