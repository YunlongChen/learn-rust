  merge:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-amd64
#      - build-arm64
    if: |
      always() &&
      needs.prepare.outputs.push == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifests
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t TAGS < <(jq -r '.tags[]' <<< '${{ needs.prepare.outputs.json }}')

          if [[ ${#TAGS[@]} -eq 0 ]]; then
            echo "No tags generated by metadata-action"
            exit 1
          fi

          for TAG in "${TAGS[@]}"; do
            REPO="${TAG%%:*}"
            ARGS=()

            for f in /tmp/digests/*; do
              DIGEST="sha256:$(basename "$f")"
              ARGS+=("${REPO}@${DIGEST}")
            done

            echo "Creating manifest for $TAG"
            docker buildx imagetools create -t "$TAG" "${ARGS[@]}"
          done

      - name: Inspect Docker Hub image
        shell: bash
        run: |
          mapfile -t TAGS < <(jq -r '.tags[]' <<< '${{ needs.prepare.outputs.json }}')
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools inspect "$TAG" || true
          done
