name: WebUI-CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - "release/*"
    paths:
      - "crates/domain-agent-management/frontend/**"
      - ".github/workflows/webui-ci.yml"
  pull_request:
    branches:
      - main
      - "release/*"
    paths:
      - "crates/domain-agent-management/frontend/**"
      - ".github/workflows/webui-ci.yml"

permissions:
  contents: read

jobs:
  webui:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/domain-agent-management/frontend/package-lock.json

      - name: Install WebUI dependencies
        working-directory: crates/domain-agent-management/frontend
        run: |
          npm ci
          npm run build

      - name: cargo login
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: cargo publish
        run: |
          cp -rf dist dist-wrap/src
          cd dist
          zip ../dist.zip -r ./
          cd -
          rm -rf .git
          ls -al dist-wrap/src/dist/
          cd dist-wrap
          cargo publish
          cd -
      - name: Upload binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            *.zip

  release-github:
    permissions:
      # Used to sign the release's artifacts with sigstore-python.
      id-token: write
      # Used to upload release artifacts.
      contents: write
    name: Publish to GitHub releases
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [ webui ]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: binaries
      - name: Sigstore Sign
        uses: sigstore/gh-action-sigstore-python@v1.2.3
        with:
          inputs: ./*.zip
          upload-signing-artifacts: true
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.zip
            *.sig
            *.crt
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true